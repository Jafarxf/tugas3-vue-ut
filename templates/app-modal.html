<div v-if="isOpen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: flex; justify-content: center; align-items: center;">
            <div style="background: white; padding: 20px; border-radius: 8px; width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
                <h3 style="margin-top: 0;">{{ title }}</h3>
                <p>{{ message }}</p>
                <button @click="closeModal" style="float: right; padding: 5px 15px;">Tutup</button>
            </div>
        </div>
